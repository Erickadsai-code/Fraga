<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academia Fraga — Reportes Meta Ads</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #ec4899;
      --success: #10b981;
      --bg-dark: #0f172a;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(15, 23, 42, 0.8);
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .header-content {
      max-width: 1280px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }

    main {
      flex: 1;
      max-width: 1280px;
      margin: auto;
      padding: 60px 20px;
      width: 100%;
    }

    h1 {
      font-family: 'Syne';
      color: white;
      margin-bottom: 10px;
    }

    p { color: rgba(255,255,255,0.7); }

    .reports-grid {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
      gap: 20px;
    }

    .report-card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: .3s;
    }

    .report-card:hover {
      transform: translateY(-5px);
    }

    .report-month {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }

    .report-year {
      font-size: 12px;
      margin-bottom: 10px;
      color: var(--text-muted);
    }

    .report-footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .report-status {
      font-size: 12px;
      color: var(--success);
    }

    footer {
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>

<body>

<header>
  <div class="header-content">
    <div class="logo">
      <div class="logo-dot"></div>
      Academia Fraga
    </div>
    <span>Meta Ads</span>
  </div>
</header>

<main>
  <h1>Reportes Meta Ads</h1>
  <p>Selecciona un mes para ver el reporte completo</p>

  <div class="reports-grid" id="reportsContainer"></div>
</main>

<footer>
  Academia Fraga • Reportes Meta Ads
</footer>

<script>
  // 🔥 NUEVA ESTRUCTURA ESCALABLE
  const availableMonths = [
    {
      month: 'Marzo',
      year: '2026',
      file: 'marzo-2026.html',
      available: true
    },
    {
      month: 'Abril',
      year: '2026',
      file: 'semana-01-10-abril-2026.html',
      available: true
    },
    {
      month: 'Mayo',
      year: '2026',
      file: '',
      available: false
    }
  ];

  const container = document.getElementById('reportsContainer');

  availableMonths.forEach(item => {

    const link = item.available
      ? `./reportes/2026/${item.file}`
      : '#';

    const card = document.createElement('a');
    card.href = link;
    card.className = 'report-card';

    if (!item.available) {
      card.style.opacity = '0.5';
      card.onclick = (e) => e.preventDefault();
    }

    card.innerHTML = `
      <div class="report-month">${item.month}</div>
      <div class="report-year">${item.year}</div>

      <p>Análisis completo de campañas Meta Ads con optimización y estrategia.</p>

      <div class="report-footer">
        <span class="report-status">
          ${item.available ? 'Disponible' : 'Próximamente'}
        </span>
        <span>→</span>
      </div>
    `;

    container.appendChild(card);
  });
</script>

</body>
</html>
