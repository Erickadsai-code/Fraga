<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia Fraga — Reportes</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter';
  background:#0f172a;
  color:white;
  margin:0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

h1{
  font-family:'Syne';
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  margin-top:40px;
}

.card{
  background:white;
  color:#111;
  border-radius:14px;
  padding:20px;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.month{
  font-size:24px;
  font-weight:700;
  color:#6366f1;
}

.year{
  font-size:12px;
  color:#777;
  margin-bottom:10px;
}

.status{
  font-size:12px;
  color:#10b981;
}

.dropdown{
  margin-top:15px;
  display:none;
  flex-direction:column;
  gap:8px;
}

.dropdown a{
  background:#f1f5f9;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  color:#111;
  font-size:14px;
  transition:.2s;
}

.dropdown a:hover{
  background:#e2e8f0;
}

.disabled{
  opacity:.4;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div class="container">
  <h1>Reportes Meta Ads</h1>
  <p>Selecciona un mes o una semana</p>

  <div class="grid" id="grid"></div>
</div>

<script>
const months = [
  {
    month:'Marzo',
    year:'2026',
    available:true,
    link:'./reportes/2026/marzo-2026.html'
  },
  {
    {
  month:'Abril',
  year:'2026',
  available:true,
  weeks:[
    {
      name:'Semana 1–10',
      link:'./reportes/2026/semana-01-10-abril-2026.html'
    },
    {
      name:'Semana 13–17',
      link:'./reportes/2026/semana-13-17-abril-2026.html'
    },
    {
      name:'Semana 21–30',
      link:'#'
    }
  ]
}
      }
    ]
  },
  {
    month:'Mayo',
    year:'2026',
    available:false
  }
];

const grid = document.getElementById('grid');

months.forEach(m => {

  const card = document.createElement('div');
  card.className = 'card';

  if(!m.available){
    card.classList.add('disabled');
  }

  card.innerHTML = `
    <div class="month">${m.month}</div>
    <div class="year">${m.year}</div>
    <div class="status">${m.available ? 'Disponible' : 'Próximamente'}</div>
    <div class="dropdown"></div>
  `;

  const dropdown = card.querySelector('.dropdown');

  // 👉 SI TIENE SEMANAS (ABRIL)
  if(m.weeks){
    m.weeks.forEach(w=>{
      const a = document.createElement('a');
      a.textContent = w.name;
      a.href = w.link;
      dropdown.appendChild(a);
    });

    card.onclick = () => {
      dropdown.style.display =
        dropdown.style.display === 'flex' ? 'none' : 'flex';
    };

  } else if(m.available){
    // 👉 SI ES MES NORMAL
    card.onclick = () => {
      window.location.href = m.link;
    };
  }

  grid.appendChild(card);
});
</script>

</body>
</html>
