<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reportes Fraga</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      width: 320px;
    }

    h2 {
      margin: 0;
      color: #6366f1;
    }

    .year {
      font-size: 14px;
      color: #64748b;
    }

    .status {
      color: #10b981;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .week-item {
      display: block;
      background: #cbd5e1;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      text-decoration: none;
      color: black;
      transition: 0.2s;
    }

    .week-item:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Abril</h2>
    <div class="year">2026</div>
    <div class="status">Disponible</div>

    <a class="week-item" href="./reportes/2026/semana-01-10-abril-2026.html">
      Semana 1–10
    </a>

    <a class="week-item" href="./reportes/2026/semana-13-17-abril-2026.html">
      Semana 13–17
    </a>

    <a class="week-item" href="#">
      Semana 21–30
    </a>
  </div>

</body>
</html>
